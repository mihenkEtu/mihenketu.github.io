<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkinlik Detayı | Mihenk ETÜ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfa; }
        .prose p { margin-bottom: 1.25rem; color: #4a4a4a; line-height: 1.75; }
    </style>
</head>
<body>

    <!-- MENÜ / NAV-BAR -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-100 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="font-bold text-xl text-stone-800 tracking-tight">MİHENK <span class="text-emerald-600 font-medium">ETÜ</span></a>
                <div class="flex space-x-6">
                    <a href="index.html" class="text-stone-600 hover:text-stone-900 transition font-medium text-sm">Ana Sayfa</a>
                    <a href="etkinlikler.html" class="text-emerald-600 font-semibold text-sm">Etkinlikler</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- ETKİNLİK İÇERİK ALANI -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 pt-10 pb-24">
        <a href="etkinlikler.html" class="text-stone-400 hover:text-stone-700 text-sm font-medium inline-flex items-center mb-8 transition">
            ← Tüm Etkinliklere Dön
        </a>

        <div id="loading" class="text-center py-12 text-stone-400 text-sm">İçerik yükleniyor...</div>

        <article id="content-area" class="hidden">
            <div class="flex items-center space-x-4 text-xs font-semibold uppercase tracking-wider mb-4">
                <span id="kategori" class="px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700"></span>
                <span id="tarih" class="text-stone-400"></span>
            </div>

            <h1 id="baslik" class="text-3xl font-bold text-stone-900 tracking-tight sm:text-4xl mb-8 leading-tight"></h1>

            <img id="afis" src="" class="w-full h-[400px] object-cover rounded-2xl bg-stone-100 shadow-sm mb-10" alt="Etkinlik Afişi">

            <div id="detay-metin" class="prose max-w-none text-stone-800 text-base border-t border-stone-100 pt-8"></div>
            
            <!-- 💬 %100 YEREL VE ŞIK FORUM ALANI -->
            <section class="mt-16 pt-10 border-t border-stone-200">
                <h2 class="text-2xl font-bold text-stone-950 mb-2">Etkinlik Forumu</h2>
                <p class="text-sm text-stone-500 mb-6">Bu etkinlik hakkındaki düşüncelerinizi ve sorularınızı paylaşın.</p>
                
                <!-- Yorum Formu -->
                <form id="comment-form" class="space-y-4 bg-white p-6 border border-stone-100 rounded-2xl shadow-sm mb-10">
                    <div>
                        <label class="block text-xs font-semibold text-stone-600 uppercase tracking-wider mb-2">Adınız Soyadınız</label>
                        <input type="text" id="comment-name" required class="w-full px-4 py-2.5 bg-stone-50 border border-stone-200 rounded-xl text-stone-800 text-sm focus:outline-none focus:border-emerald-500 transition" placeholder="Örn: Ahmet Yılmaz">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-stone-600 uppercase tracking-wider mb-2">Yorumunuz</label>
                        <textarea id="comment-text" required rows="4" class="w-full px-4 py-2.5 bg-stone-50 border border-stone-200 rounded-xl text-stone-800 text-sm focus:outline-none focus:border-emerald-500 transition" placeholder="Etkinlik hakkındaki fikirleriniz..."></textarea>
                    </div>
                    <button type="submit" class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm rounded-xl shadow-sm transition">Yorumu Gönder</button>
                </form>

                <!-- Gönderilen Yorumların Listeleneceği Yer -->
                <div id="comments-list" class="space-y-4">
                    <p id="no-comments" class="text-stone-400 text-sm italic">Henüz yorum yapılmamış. İlk yorumu sen yap!</p>
                </div>
            </section>
        </article>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        const username = 'mihenkEtu';
        const repo = 'mihenketu.github.io';
        const folder = '_etkinlikler';

        // Hafıza anahtarını doğrudan dosya adına eşitleyen güvenli tanım
        const storageKey = fileName ? `comments_${fileName}` : 'comments_genel';

        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        async function detayGetir() {
            if (!fileName) {
                document.getElementById('loading').innerText = "Etkinlik bulunamadı.";
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}/${fileName}`);
                if (!response.ok) throw new Error('Dosya bulunamadı');
                
                const fileData = await response.json();
                const rawText = b64DecodeUnicode(fileData.content.replace(/\s/g, ''));

                const parts = rawText.split('---');
                const frontmatterText = parts[1];
                const bodyText = parts.slice(2).join('---').trim();

                if (frontmatterText) {
                    const lines = frontmatterText.split('\n');
                    const data = {};
                    lines.forEach(line => {
                        const index = line.indexOf(':');
                        if (index !== -1) {
                            data[line.substring(0, index).trim()] = line.substring(index + 1).trim().replace(/^"|"$/g, '');
                        }
                    });

                    document.getElementById('baslik').innerText = data.title || 'Başlıksız Etkinlik';
                    document.getElementById('tarih').innerText = data.date || '';
                    document.getElementById('kategori').innerText = data.kategori || 'Genel';
                    document.getElementById('afis').src = data.thumbnail ? data.thumbnail : 'https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&w=600&q=80';
                    document.getElementById('detay-metin').innerHTML = marked.parse(bodyText || "*Bu etkinlik için detaylı açıklama girilmemiş.*");

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content-area').classList.remove('hidden');
                    
                    // Detaylar başarıyla yüklenince yorumları getir
                    yorumlarıYukle();
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = "Etkinlik detayları yüklenirken bir hata oluştu.";
            }
        }

        // GARANTİLİ YORUM YÜKLEME FONKSİYONU
        function yorumlarıYukle() {
            const commentsList = document.getElementById('comments-list');
            const savedComments = JSON.parse(localStorage.getItem(storageKey)) || [];

            commentsList.innerHTML = '';
            
            if (savedComments.length === 0) {
                commentsList.innerHTML = `<p id="no-comments" class="text-stone-400 text-sm italic">Henüz yorum yapılmamış. İlk yorumu sen yap!</p>`;
                return;
            }

            // En yeni yorumu en üstte göstermek için ters çeviriyoruz
            savedComments.reverse().forEach(comment => {
                const item = document.createElement('div');
                item.className = "bg-stone-50 border border-stone-100 p-5 rounded-xl transition duration-200 animate-fadeIn";
                item.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-semibold text-stone-800 text-sm">${comment.name}</span>
                        <span class="text-stone-400 text-xs">${comment.date}</span>
                    </div>
                    <p class="text-stone-600 text-sm leading-relaxed">${comment.text}</p>
                `;
                commentsList.appendChild(item);
            });
        }

        // Form Gönderme Olayı
        document.getElementById('comment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nameInput = document.getElementById('comment-name');
            const textInput = document.getElementById('comment-text');
            
            if(!nameInput.value.trim() || !textInput.value.trim()) return;

            const newComment = {
                name: nameInput.value.trim(),
                text: textInput.value.trim(),
                date: new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' })
            };

            // Hafızadaki eski listeyi al, yenisini ekle
            const savedComments = JSON.parse(localStorage.getItem(storageKey)) || [];
            savedComments.push(newComment);
            localStorage.setItem(storageKey, JSON.stringify(savedComments));

            // Formu boşalt ve listeyi anında güncelle
            nameInput.value = '';
            textInput.value = '';
            yorumlarıYukle();
        });

        // Sayfa açılışında motoru tetikle
        detayGetir();
    </script>
</body>
</html>
