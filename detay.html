<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkinlik Detayı | Mihenk ETÜ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfa; }
        .prose p { margin-bottom: 1.25rem; color: #4a4a4a; line-height: 1.75; }
    </style>
</head>
<body>

    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-100 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="font-bold text-xl text-stone-800 tracking-tight">MİHENK <span class="text-emerald-600 font-medium">ETÜ</span></a>
                <div class="flex space-x-6">
                    <a href="index.html" class="text-stone-600 hover:text-stone-900 transition font-medium text-sm">Ana Sayfa</a>
                    <a href="etkinlikler.html" class="text-emerald-600 font-semibold text-sm">Etkinlikler</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 pt-10 pb-24">
        <a href="etkinlikler.html" class="text-stone-400 hover:text-stone-700 text-sm font-medium inline-flex items-center mb-8 transition">
            ← Tüm Etkinliklere Dön
        </a>

        <div id="loading" class="text-center py-12 text-stone-400 text-sm">İçerik yükleniyor...</div>

        <article id="content-area" class="hidden">
            <div class="flex items-center space-x-4 text-xs font-semibold uppercase tracking-wider mb-4">
                <span id="kategori" class="px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700"></span>
                <span id="tarih" class="text-stone-400"></span>
            </div>

            <h1 id="baslik" class="text-3xl font-bold text-stone-900 tracking-tight sm:text-4xl mb-8 leading-tight"></h1>

            <img id="afis" src="" class="w-full h-[400px] object-cover rounded-2xl bg-stone-100 shadow-sm mb-10" alt="Etkinlik Afişi">

            <div id="detay-metin" class="prose max-w-none text-stone-800 text-base border-t border-stone-100 pt-8"></div>
            
            <section class="mt-16 pt-10 border-t border-stone-200">
                <h2 class="text-2xl font-bold text-stone-950 mb-2">Etkinlik Forumu</h2>
                <p class="text-sm text-stone-500 mb-8">Bu etkinlik hakkındaki düşüncelerinizi, sorularınızı ve fikirlerinizi paylaşın.</p>
                
                <div id="disqus_thread"></div>
            </section>
        </article>
    </main>

    <script>
        // URL'den hangi dosyanın okunacağını anla
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        const username = 'mihenkEtu';
        const repo = 'mihenketu.github.io';
        const folder = '_etkinlikler';

        // TÜRKÇE KARAKTERLERİ KORUYAN ÖZEL DEŞİFRE FONKSİYONU
        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        async function detayGetir() {
            if (!fileName) {
                document.getElementById('loading').innerText = "Etkinlik bulunamadı.";
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}/${fileName}`);
                if (!response.ok) throw new Error('Dosya bulunamadı');
                
                const fileData = await response.json();
                
                // Türkçe dostu fonksiyonu kullanıyoruz:
                const rawText = b64DecodeUnicode(fileData.content.replace(/\s/g, ''));

                const parts = rawText.split('---');
                const frontmatterText = parts[1];
                const bodyText = parts.slice(2).join('---').trim();

                if (frontmatterText) {
                    const lines = frontmatterText.split('\n');
                    const data = {};
                    lines.forEach(line => {
                        const index = line.indexOf(':');
                        if (index !== -1) {
                            data[line.substring(0, index).trim()] = line.substring(index + 1).trim().replace(/^"|"$/g, '');
                        }
                    });

                    // Verileri ekrana bas
                    document.getElementById('baslik').innerText = data.title || 'Başlıksız Etkinlik';
                    document.getElementById('tarih').innerText = data.date || '';
                    document.getElementById('kategori').innerText = data.kategori || 'Genel';
                    document.getElementById('afis').src = data.thumbnail ? data.thumbnail : 'https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&w=600&q=80';
                    
                    // Markdown içeriği bas
                    document.getElementById('detay-metin').innerHTML = marked.parse(bodyText || "*Bu etkinlik için detaylı açıklama girilmemiş.*");

                    // Alanları düzenle
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content-area').classList.remove('hidden');
                    
                    // Veriler yüklendikten sonra forumu tetikle
                    forumBaslat();
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = "Etkinlik detayları yüklenirken bir hata oluştu.";
            }
        }

        // FORUMU AKTİF EDEN DİNAMİK DISQUS FONKSİYONU
        function forumBaslat() {
            window.disqus_config = function () {
                this.page.url = window.location.href;  // Sayfanın şu anki tam URL'si
                this.page.identifier = fileName;       // Dosya adı (Örn: 2026-06-14-ilk-bulusma.md)
            };

            var d = document, s = d.createElement('script');
            s.src = 'https://mihenk-etu.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        }

        // Sayfa açıldığında ana motoru çalıştır
        detayGetir();
    </script>

    <script id="dsq-count-scr" src="//mihenk-etu.disqus.com/count.js" async></script>
</body>
</html>
