<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkinlikler | Mihenk ETÜ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfa; }
    </style>
</head>
<body>

    <!-- MENÜ / NAV-BAR -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="font-bold text-xl text-stone-800 tracking-tight">MİHENK <span class="text-emerald-600 font-medium">ETÜ</span></a>
                <div class="flex space-x-6">
                    <a href="index.html" class="text-stone-600 hover:text-stone-900 transition font-medium text-sm">Ana Sayfa</a>
                    <a href="etkinlikler.html" class="text-emerald-600 font-semibold text-sm border-b-2 border-emerald-600 pb-1">Etkinlikler</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- BAŞLIK ALANI -->
    <header class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pt-12 pb-6">
        <h1 class="text-3xl font-bold text-stone-900 tracking-tight sm:text-4xl">Topluluk Etkinliklerimiz</h1>
        <p class="mt-2 text-stone-500 text-base">Mihenk bünyesinde gerçekleştirdiğimiz ve planladığımız tüm buluşmalar.</p>
        <div class="w-12 h-1 bg-emerald-500 mt-4 rounded-full"></div>
    </header>

    <!-- YÜKLENİYOR ALANI -->
    <div id="loading" class="text-stone-400 text-sm py-12 text-center">Etkinlikler yükleniyor...</div>

    <!-- ETKİNLİKLER ANA ALAN -->
    <main id="main-content" class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pb-24 hidden space-y-16">
        
        <!-- 🎯 1. BÖLÜM: YAKLAŞAN ETKİNLİKLER -->
        <section id="upcoming-section" class="hidden">
            <h2 class="text-2xl font-bold text-stone-900 mb-6 flex items-center">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 inline-block mr-2.5 animate-pulse"></span>
                Yaklaşan Etkinlikler
            </h2>
            <div id="upcoming-grid" class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3"></div>
        </section>

        <!-- 🎯 2. BÖLÜM: GEÇMİŞ ETKİNLİKLER -->
        <section id="past-section" class="hidden">
            <h2 class="text-2xl font-bold text-stone-800 mb-6 flex items-center border-t border-stone-100 pt-10">
                <span class="w-2.5 h-2.5 rounded-full bg-stone-400 inline-block mr-2.5"></span>
                Geçmiş Etkinlikler
            </h2>
            <div id="past-grid" class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3"></div>
        </section>

    </main>

    <!-- AKILLI TARİH AYIKLAMA MOTORU -->
    <script>
        const username = 'mihenkEtu';
        const repo = 'mihenketu.github.io';
        const folder = '_etkinlikler';

        async function etkinlikleriGetir() {
            const upcomingGrid = document.getElementById('upcoming-grid');
            const pastGrid = document.getElementById('past-grid');
            const loading = document.getElementById('loading');
            const mainContent = document.getElementById('main-content');
            const upcomingSection = document.getElementById('upcoming-section');
            const pastSection = document.getElementById('past-section');

            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
                if (!response.ok) throw new Error('Klasör okunamadı.');
                
                const allFiles = await response.json();
                const files = allFiles.filter(file => file.name.endsWith('.md'));

                if (files.length === 0) {
                    loading.innerText = "Henüz eklenmiş bir etkinlik bulunmuyor.";
                    return;
                }

                // Bugünün tarihi (Zaman karşılaştırması için saf tarih objesi)
                const today = new Date();
                today.setHours(0,0,0,0);

                let upcomingCount = 0;
                let pastCount = 0;

                for (const file of files) {
                    try {
                        const fileResponse = await fetch(file.download_url);
                        const rawText = await fileResponse.text();

                        const parts = rawText.split('---');
                        const frontmatterText = parts[1];
                        
                        if (frontmatterText) {
                            const lines = frontmatterText.split('\n');
                            const data = {};
                            lines.forEach(line => {
                                const index = line.indexOf(':');
                                if (index !== -1) {
                                    data[line.substring(0, index).trim()] = line.substring(index + 1).trim().replace(/^"|"$/g, '');
                                }
                            });

                            // Kart Tasarım Şablonu
                            const card = document.createElement('div');
                            card.className = "bg-white border border-stone-100 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition duration-300 flex flex-col";

                            const thumbnail = data.thumbnail ? data.thumbnail : 'https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&w=600&q=80';

                            card.innerHTML = `
                                <img src="${thumbnail}" class="w-full h-48 object-cover bg-stone-100" alt="${data.title || 'Etkinlik'}">
                                <div class="p-6 flex flex-col flex-grow">
                                    <div class="flex items-center justify-between text-xs font-semibold uppercase tracking-wider mb-3">
                                        <span class="px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700">${data.kategori || 'Genel'}</span>
                                        <span class="text-stone-400">${data.date || ''}</span>
                                    </div>
                                    <h3 class="text-xl font-bold text-stone-800 leading-snug mb-2">${data.title || 'Başlıksız Etkinlik'}</h3>
                                    <p class="text-stone-500 text-sm line-clamp-3 mb-4 flex-grow">${data.description || ''}</p>
                                    <div class="pt-4 border-t border-stone-50 mt-auto">
                                        <a href="detay.html?file=${file.name}" class="text-emerald-600 font-medium text-sm inline-flex items-center hover:text-emerald-700 transition">
                                            Detayları Gör <span class="ml-1">→</span>
                                        </a>
                                    </div>
                                </div>
                            `;

                            // ⏰ TARİH KONTROLÜ VE OTOMATİK AYIRMA SİHRİ
                            const eventDate = new Date(data.date);
                            eventDate.setHours(0,0,0,0);

                            if (eventDate >= today) {
                                // Tarih gelecekteyse Yaklaşanlara at
                                upcomingGrid.appendChild(card);
                                upcomingCount++;
                            } else {
                                // Tarih geçmişteyse Geçmiş Etkinliklere at
                                pastGrid.appendChild(card);
                                pastCount++;
                            }
                        }
                    } catch (e) {
                        console.error("Dosya okunurken hata:", e);
                    }
                }

                // Bölümlerin görünürlüğünü ayarla
                if (upcomingCount > 0) upcomingSection.classList.remove('hidden');
                if (pastCount > 0) pastSection.classList.remove('hidden');

                loading.style.display = 'none';
                mainContent.classList.remove('hidden');

            } catch (error) {
                console.error("Genel Hata:", error);
                loading.innerText = "Etkinlikler listelenirken bir hata oluştu.";
            }
        }

        etkinlikleriGetir();
    </script>
</body>
</html>
